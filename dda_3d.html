<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D DDA Algorithm Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e1e1e;
            color: white;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
        }
    </style>
    <!-- Three.js 및 관련 라이브러리 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
    <div id="info">
        <h3 style="margin-top:0;">3D DDA Voxel Traversal</h3>
        <p>마우스 좌클릭: <b>회전</b> | 휠: <b>확대/축소</b> | 우클릭: <b>이동</b></p>
        <p style="color: #00ff88;">■ DDA가 탐색한 복셀(Voxel)</p>
        <p style="color: #ffffff;">■ 광선 궤적 (Ray)</p>
        <p style="color: #0088ff;">● 시작점 (Player)</p>
        <p style="color: #ff3333;">○ 타겟 장애물 (Sphere)</p>
    </div>

    <script>
        // =========================
        // 1. 기본 설정 및 파라미터
        // =========================
        const GRID_SIZE = 20;
        const VOXEL = 10;
        const MAX_DEPTH = 500;
        
        const params = {
            theta: 45, // 방위각 (0~360)
            phi: 60,   // 고도각 (0~180)
            playerX: 50,
            playerY: 50,
            playerZ: 50,
            sphereX: 120,
            sphereY: 100,
            sphereZ: 90,
            sphereR: 35
        };

        // =========================
        // 2. Three.js 씬(Scene) 셋업
        // =========================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(280, 250, 280);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        const boxSize = GRID_SIZE * VOXEL;
        controls.target.set(boxSize/2, boxSize/2, boxSize/2);
        controls.update();

        // 조명
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x606060));

        // 맵 테두리 (Bounding Box)
        const boxGeo = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
        const boxEdges = new THREE.EdgesGeometry(boxGeo);
        const boxMat = new THREE.LineBasicMaterial({ color: 0x555555 });
        const boundingBox = new THREE.LineSegments(boxEdges, boxMat);
        boundingBox.position.set(boxSize/2, boxSize/2, boxSize/2);
        scene.add(boundingBox);

        // 그리드 헬퍼 (바닥면 격자)
        const gridHelper = new THREE.GridHelper(boxSize, GRID_SIZE, 0x444444, 0x222222);
        gridHelper.position.set(boxSize/2, 0, boxSize/2);
        scene.add(gridHelper);

        let renderGroup = new THREE.Group();
        scene.add(renderGroup);

        // =========================
        // 3. GUI 컨트롤 패널 생성
        // =========================
        const gui = new dat.GUI();
        
        const folderRay = gui.addFolder('Ray Direction (Angle)');
        folderRay.add(params, 'theta', 0, 360).name('방위각 (Theta)').onChange(drawScene);
        folderRay.add(params, 'phi', 0, 180).name('고도각 (Phi)').onChange(drawScene);
        folderRay.open();

        const folderPlayer = gui.addFolder('Player (Origin)');
        folderPlayer.add(params, 'playerX', 0, boxSize).name('X').onChange(drawScene);
        folderPlayer.add(params, 'playerY', 0, boxSize).name('Y').onChange(drawScene);
        folderPlayer.add(params, 'playerZ', 0, boxSize).name('Z').onChange(drawScene);
        folderPlayer.open();

        const folderTarget = gui.addFolder('Target Sphere');
        folderTarget.add(params, 'sphereX', 0, boxSize).name('X').onChange(drawScene);
        folderTarget.add(params, 'sphereY', 0, boxSize).name('Y').onChange(drawScene);
        folderTarget.add(params, 'sphereZ', 0, boxSize).name('Z').onChange(drawScene);
        folderTarget.add(params, 'sphereR', 5, 100).name('Radius(반지름)').onChange(drawScene);
        folderTarget.open();

        // =========================
        // 4. 수학 / 논리 함수들
        // =========================
        function isOutside(ix, iy, iz) {
            return (ix < 0 || ix >= GRID_SIZE || iy < 0 || iy >= GRID_SIZE || iz < 0 || iz >= GRID_SIZE);
        }

        function voxelOverlapsSphere(ix, iy, iz) {
            const left = ix * VOXEL, right = left + VOXEL;
            const bottom = iy * VOXEL, top = bottom + VOXEL;
            const back = iz * VOXEL, front = back + VOXEL;

            const cx = Math.max(left, Math.min(params.sphereX, right));
            const cy = Math.max(bottom, Math.min(params.sphereY, top));
            const cz = Math.max(back, Math.min(params.sphereZ, front));

            const ddx = params.sphereX - cx;
            const ddy = params.sphereY - cy;
            const ddz = params.sphereZ - cz;

            return (ddx * ddx + ddy * ddy + ddz * ddz) <= (params.sphereR * params.sphereR);
        }

        // =========================
        // 5. 메인 DDA 시각화 렌더링
        // =========================
        function drawScene() {
            // 그룹 비우기 (초기화)
            while(renderGroup.children.length > 0) {
                let child = renderGroup.children[0];
                renderGroup.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
            }

            // 1. 플레이어 그리기
            const playerGeo = new THREE.SphereGeometry(3, 16, 16);
            const playerMat = new THREE.MeshBasicMaterial({ color: 0x0088ff });
            const playerMesh = new THREE.Mesh(playerGeo, playerMat);
            playerMesh.position.set(params.playerX, params.playerY, params.playerZ);
            renderGroup.add(playerMesh);

            // 2. 구(Sphere) 장애물 그리기
            const sphereGeo = new THREE.SphereGeometry(params.sphereR, 32, 16);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0xff3333, wireframe: true, transparent: true, opacity: 0.3 });
            const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
            sphereMesh.position.set(params.sphereX, params.sphereY, params.sphereZ);
            renderGroup.add(sphereMesh);

            // 3. 방향 벡터 계산 (구면 좌표계 -> 직교 좌표계)
            const radTheta = THREE.MathUtils.degToRad(params.theta);
            const radPhi = THREE.MathUtils.degToRad(params.phi);
            const dx = Math.sin(radPhi) * Math.cos(radTheta);
            const dy = Math.sin(radPhi) * Math.sin(radTheta);
            const dz = Math.cos(radPhi);

            // 4. 3D DDA 알고리즘 실행
            let px = params.playerX, py = params.playerY, pz = params.playerZ;
            let ix = Math.floor(px / VOXEL);
            let iy = Math.floor(py / VOXEL);
            let iz = Math.floor(pz / VOXEL);

            let deltaX = Math.abs(1 / dx); if (!isFinite(deltaX)) deltaX = Infinity;
            let deltaY = Math.abs(1 / dy); if (!isFinite(deltaY)) deltaY = Infinity;
            let deltaZ = Math.abs(1 / dz); if (!isFinite(deltaZ)) deltaZ = Infinity;

            let stepX, stepY, stepZ, sideX, sideY, sideZ;

            if (dx < 0) { stepX = -1; sideX = (px / VOXEL - ix) * deltaX; }
            else        { stepX = 1;  sideX = (ix + 1 - px / VOXEL) * deltaX; }

            if (dy < 0) { stepY = -1; sideY = (py / VOXEL - iy) * deltaY; }
            else        { stepY = 1;  sideY = (iy + 1 - py / VOXEL) * deltaY; }

            if (dz < 0) { stepZ = -1; sideZ = (pz / VOXEL - iz) * deltaZ; }
            else        { stepZ = 1;  sideZ = (iz + 1 - pz / VOXEL) * deltaZ; }

            let visitedVoxels = [];
            let hit = false;
            let lastAxis = 'x';
            let checks = 0;

            while (checks < MAX_DEPTH) {
                checks++;
                visitedVoxels.push({ x: ix, y: iy, z: iz });

                if (isOutside(ix, iy, iz)) break;
                
                if (voxelOverlapsSphere(ix, iy, iz)) {
                    hit = true;
                    break;
                }

                if (sideX < sideY && sideX < sideZ) {
                    sideX += deltaX; ix += stepX; lastAxis = 'x';
                } else if (sideY < sideZ) {
                    sideY += deltaY; iy += stepY; lastAxis = 'y';
                } else {
                    sideZ += deltaZ; iz += stepZ; lastAxis = 'z';
                }
            }

            // 5. 탐색한 복셀(Voxel)들을 반투명 큐브로 렌더링
            const voxelGeo = new THREE.BoxGeometry(VOXEL, VOXEL, VOXEL);
            const voxelMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.25 });
            const voxelEdgeMat = new THREE.LineBasicMaterial({ color: 0x00aa55, transparent: true, opacity: 0.5 });

            visitedVoxels.forEach(v => {
                if (!isOutside(v.x, v.y, v.z)) {
                    const mesh = new THREE.Mesh(voxelGeo, voxelMat);
                    mesh.position.set(v.x * VOXEL + VOXEL/2, v.y * VOXEL + VOXEL/2, v.z * VOXEL + VOXEL/2);
                    
                    const edges = new THREE.EdgesGeometry(voxelGeo);
                    const line = new THREE.LineSegments(edges, voxelEdgeMat);
                    mesh.add(line);
                    
                    renderGroup.add(mesh);
                }
            });

            // 6. 실제 광선(Ray) 선 긋기
            let distance = 0;
            if (lastAxis === 'x') distance = (ix - px / VOXEL + (1 - stepX) / 2) / dx;
            else if (lastAxis === 'y') distance = (iy - py / VOXEL + (1 - stepY) / 2) / dy;
            else distance = (iz - pz / VOXEL + (1 - stepZ) / 2) / dz;

            distance = Math.abs(distance * VOXEL);
            if (!hit && distance > boxSize * 2) distance = boxSize * 2; // 맵 밖으로 나간 경우 적당히 자르기

            const endX = px + dx * distance;
            const endY = py + dy * distance;
            const endZ = pz + dz * distance;

            const points = [new THREE.Vector3(px, py, pz), new THREE.Vector3(endX, endY, endZ)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            const rayLine = new THREE.Line(lineGeo, lineMat);
            renderGroup.add(rayLine);
        }

        // 초기 화면 렌더링
        drawScene();

        // =========================
        // 6. 애니메이션 루프 & 리사이즈
        // =========================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
